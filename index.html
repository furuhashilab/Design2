<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup Journey — 3D Storytelling Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 背景の装飾 -->
  <div class="bg-grain"></div>

  <!-- マップコンテナ -->
  <div id="map"></div>

  <!-- HUDオーバーレイ -->
  <div class="hud-overlay">

    <!-- ヘッダーバー -->
    <header class="hud-header">
      <div class="hud-logo">
        <span class="logo-trophy">⚽</span>
        <div class="logo-text">
          <span class="logo-main">WORLD CUP JOURNEY</span>
          <span class="logo-sub">歴代優勝国を巡る3Dストリーテリングマップ</span>
        </div>
      </div>
      <div class="hud-event">
        <span class="event-label">SotM Asia 2026 Osaka</span>
      </div>
    </header>

    <!-- サイドパネル -->
    <aside class="side-panel" id="sidePanel">
      <div class="panel-scene-num">
        <span class="scene-current" id="sceneNum">01</span>
        <span class="scene-sep">/</span>
        <span class="scene-total">10</span>
      </div>

      <div class="panel-flag" id="panelFlag"></div>

      <div class="panel-country" id="panelCountry">ウルグアイ</div>
      <div class="panel-landmark" id="panelLandmark">コロニア・デル・サクラメント</div>

      <div class="panel-divider">
        <span class="divider-line"></span>
        <span class="divider-trophy">🏆</span>
        <span class="divider-line"></span>
      </div>

      <div class="panel-wins-label">優勝回数</div>
      <div class="panel-wins" id="panelWins">2回（1930年、1950年）</div>

      <div class="panel-players-label">代表的選手</div>
      <div class="panel-players" id="panelPlayers">ルイス・スアレス、ディエゴ・フォルラン</div>

      <div class="panel-description" id="panelDescription">
        世界遺産に登録されたウルグアイ最古の街。
      </div>

      <div class="panel-charm" id="panelCharm">
        時間が止まったようなノスタルジックな雰囲気が漂う。
      </div>
    </aside>

    <!-- プログレスバー -->
    <div class="progress-bar-container">
      <div class="progress-dots" id="progressDots"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- コントロールボタン -->
    <div class="controls">
      <button class="ctrl-btn" id="btnPrev" title="前のシーン">&#9664;</button>
      <button class="ctrl-btn ctrl-play" id="btnPlay" title="再生/停止">&#9646;&#9646;</button>
      <button class="ctrl-btn" id="btnNext" title="次のシーン">&#9654;</button>
    </div>

    <!-- シーンカウントダウン -->
    <div class="countdown-ring-wrap">
      <svg class="countdown-ring" viewBox="0 0 44 44">
        <circle class="ring-bg" cx="22" cy="22" r="18"/>
        <circle class="ring-fill" id="ringFill" cx="22" cy="22" r="18"/>
      </svg>
    </div>

  </div>

  <!-- ポップアップ（カスタム） -->
  <div class="custom-popup" id="customPopup">
    <div class="popup-inner">
      <div class="popup-title" id="popupTitle"></div>
      <div class="popup-landmark" id="popupLandmark"></div>
    </div>
  </div>

  <!-- ローディング画面 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-inner">
      <div class="loading-ball">⚽</div>
      <div class="loading-text">MAP LOADING…</div>
      <div class="loading-bar"><div class="loading-bar-fill" id="loadingBarFill"></div></div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="scenes.js"></script>
  <script src="app.js"></script>
</body>
</html>
